# DOSU Gem — Frontend (SPA)
# Domain : dosugem.dosutech.site
# Path   : /home/dosugem/dist
#
# Bước 1: copy file này → nginx -t → reload  (chỉ HTTP :80)
# Bước 2: xin cert DNS TXT thủ công → deploy/DEPLOY.md mục 6

server {
    listen 80;
    listen [::]:80;
    server_name dosugem.dosutech.site;

    root /home/dosugem/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA — fallback index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}
