# DOSU Gem — Frontend (SPA)
# Domain : dosugem.dosutech.site
# Path   : /home/dosugem/dist
# SSL    : /etc/letsencrypt/live/dosugem.dosutech.site/

server {
    listen 80;
    listen [::]:80;
    server_name dosugem.dosutech.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dosugem.dosutech.site;

    ssl_certificate     /etc/letsencrypt/live/dosugem.dosutech.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dosugem.dosutech.site/privkey.pem;

    root /home/dosugem/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}
