# DOSU Gem — Frontend (SPA)
# Domain : dosugem.dosutech.site
# Static : /var/www/dosugem/dist  (build: npm run build)
# Nginx listen 443 — serve file tĩnh, không proxy port dev 5173/3000

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name dosugem.dosutech.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dosugem.dosutech.site;

    ssl_certificate     /etc/letsencrypt/live/dosugem.dosutech.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dosugem.dosutech.site/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/dosugem/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}
