# DOSU Gem — Backend API
# Domain : api-dosugem.dosutech.site
# Upstream: 127.0.0.1:5081  (PM2: dosugem-api)
# SSL    : /etc/letsencrypt/live/dosugem.dosutech.site/
# CORS   : xử lý trong Express (server/index.ts) — không set ở nginx

upstream dosugem_api {
    server 127.0.0.1:5081;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api-dosugem.dosutech.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api-dosugem.dosutech.site;

    ssl_certificate     /etc/letsencrypt/live/dosugem.dosutech.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dosugem.dosutech.site/privkey.pem;

    client_max_body_size 10m;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://dosugem_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /api/health {
        proxy_pass http://dosugem_api/api/health;
        access_log off;
    }
}
