# DOSU Gem — Backend API
# Domain : api-dosugem.dosutech.site
# Upstream: 127.0.0.1:5081  (PM2: dosugem-api)
#
# Bước 1: copy file này → nginx -t → reload  (chỉ HTTP :80)
# Bước 2: xin cert DNS TXT thủ công → deploy/DEPLOY.md mục 6

upstream dosugem_api {
    server 127.0.0.1:5081;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api-dosugem.dosutech.site;

    client_max_body_size 10m;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # CORS — cho phép frontend (http hoặc https sau certbot)
    set $cors_origin "";
    if ($http_origin ~* ^https?://dosugem\.dosutech\.site$) {
        set $cors_origin $http_origin;
    }

    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;

        proxy_pass http://dosugem_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /api/health {
        proxy_pass http://dosugem_api/api/health;
        access_log off;
    }
}
